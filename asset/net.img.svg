<svg xmlns="http://www.w3.org/2000/svg" width="60" height="395" viewBox="0 0 60 395">

  <!-- ── 뒤 기둥 ── -->
  <!-- 파란 기둥 (y=46, 위로 이동) -->
  <rect x="15" y="46" width="30" height="88" fill="#2a3e68"/>
  <ellipse cx="30" cy="46" rx="15" ry="5" fill="#3e5888"/>
  <ellipse cx="30" cy="134" rx="15" ry="5" fill="#2a3e68"/>
  <!-- 쇠봉 (위 고정, 아래 y=44로 줄어듦) -->
  <rect x="24" y="0" width="12" height="44" fill="#606870" rx="1"/>
  <ellipse cx="30" cy="0" rx="6" ry="2.5" fill="#828a92"/>
  <ellipse cx="30" cy="44" rx="6" ry="2.5" fill="#606870"/>

  <!-- ── 앞 기둥 ── -->
  <!-- 파란 기둥 (위치 그대로 y=294) -->
  <rect x="15" y="294" width="30" height="88" fill="#2a3e68"/>
  <ellipse cx="30" cy="294" rx="15" ry="5" fill="#3e5888"/>
  <ellipse cx="30" cy="382" rx="15" ry="5" fill="#2a3e68"/>
  <!-- 쇠봉 (하단 y=292 고정, 상단 y=248로 줄어듦) -->
  <rect x="24" y="248" width="12" height="44" fill="#606870" rx="1"/>
  <ellipse cx="30" cy="248" rx="6" ry="2.5" fill="#828a92"/>
  <ellipse cx="30" cy="292" rx="6" ry="2.5" fill="#606870"/>

  <!-- ── 흰 선 (네트, y=0~248) ── -->
  <rect x="28" y="0" width="4" height="248" fill="#c8ccd0"/>

</svg>
